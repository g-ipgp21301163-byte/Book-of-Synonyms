<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pastel Synonyms Book</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#dff7ff,#f6e6ff,#ffe6f2);
  font-family:'Comic Sans MS',cursive;
  overflow:hidden;
  color:#444;
}

/* BUBBLES */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  animation:float 8s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-600px);}
}

/* BOOK */
.book{
  width:920px;
  height:520px;
  background:#fff;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
}

/* PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.active{ display:flex; }

/* BUTTONS */
button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ffb3d9,#ffd6a5);
  cursor:pointer;
  font-size:16px;
  color:#444;
  box-shadow:0 5px #e6a8c9;
  transition:0.2s;
}
button:hover{ transform:scale(1.1); }
button:active{
  transform:translateY(3px);
  box-shadow:0 2px #e6a8c9;
}

/* TITLE */
.cover-title{
  font-size:40px;
  color:#ff80bf;
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 5px #fff;}
  to{ text-shadow:0 0 15px #ffb3d9;}
}

/* INPUT */
input{
  padding:10px;
  border-radius:15px;
  border:2px solid #ddd;
  text-align:center;
}

/* POPUP */
.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
  width:80%;
  text-align:center;
}
.popup.show{
  transform:translate(-50%,-50%) scale(1);
}

/* CARDS CENTER FIX */
.card-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
  margin-top:15px;
}

/* CARD */
.card{
  background:#fff0f6;
  padding:15px;
  border-radius:15px;
  width:180px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.word{
  color:#ff66a3;
  font-weight:bold;
}

/* SPEAKER */
.speaker{
  cursor:pointer;
  margin-left:6px;
  font-size:18px;
  transition:0.2s;
}
.speaker:hover{
  transform:scale(1.3);
}

/* ANIMATION */
.animated{
  animation:bounce 1s infinite alternate;
}
@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-8px);}
}

/* CONTROLS */
.controls{
  position:absolute;
  bottom:15px;
  right:15px;
  display:flex;
  gap:10px;
}

/* WARNING */
.warning{
  color:#ff4d4d;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- AUDIO (replace with Google Drive if needed) -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="soundOpen" src="open.mp3"></audio>
<audio id="soundClick" src="click.mp3"></audio>
<audio id="soundSearch" src="search.mp3"></audio>
<audio id="soundReset" src="reset.mp3"></audio>
<audio id="soundClose" src="close.mp3"></audio>

<script>
for(let i=0;i<25;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.width=b.style.height=(10+Math.random()*20)+"px";
  b.style.left=Math.random()*100+"%";
  b.style.bottom="-50px";
  document.body.appendChild(b);
}
</script>

<div class="book">

<!-- COVER -->
<div class="page active" id="page1">
  <h1 class="cover-title">The Book of Synonyms</h1>
  <button onclick="startBook()">Open Book</button>
</div>

<!-- NAME -->
<div class="page" id="page2">
  <h2>Explorer's Name</h2>
  <input id="nameInput" placeholder="Enter your name">
  <button onclick="saveName()">Enter</button>
  <div class="warning" id="warning"></div>
</div>

<!-- GREETING -->
<div class="page" id="page3">
  <h2 id="welcome"></h2>
  <button onclick="nextPage(4)">Let's Explore</button>
</div>

<!-- SEARCH -->
<div class="page" id="page4">
  <h2 class="animated">Find a word ✨</h2>

  <input id="searchInput" placeholder="Enter adjective">
  <button onclick="searchWord()">🔍</button>

  <div class="popup" id="popup"></div>

  <div class="controls">
    <button onclick="resetSearch()">Reset</button>
    <button onclick="nextPage(1)">Close Book</button>
  </div>
</div>

</div>

<script>

function playSound(id){
  let s=document.getElementById(id);
  if(s){ s.currentTime=0; s.play(); }
}

function startBook(){
  playSound('soundOpen');
  document.getElementById("bgMusic").volume=0.3;
  document.getElementById("bgMusic").play();
  nextPage(2);
}

function nextPage(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");
}

function saveName(){
  let name=document.getElementById("nameInput").value.trim();
  let warn=document.getElementById("warning");

  if(name===""){
    warn.innerText="⚠ Please enter your name!";
    return;
  }

  warn.innerText="";
  localStorage.setItem("name",name);
  document.getElementById("welcome").innerText="Welcome, Explorer "+name;
  nextPage(3);
}

/* WORD DATA */
const words={
happy:["joyful","cheerful","She felt joyful today.","He is a cheerful boy."],
sad:["unhappy","gloomy","She looked unhappy.","The weather is gloomy."],
fast:["quick","rapid","He is quick.","The car is rapid."]
};

/* SEARCH */
function searchWord(){
  let input=document.getElementById("searchInput").value.toLowerCase();
  let popup=document.getElementById("popup");

  if(!words[input]){
    popup.innerHTML="<p>Word not found 😢</p>";
    popup.classList.add("show");
    return;
  }

  let w=words[input];

  popup.innerHTML=`
    <h3 class="animated">${input}</h3>

    <div class="card-container">

      <div class="card">
        <div class="word">
          ${w[0]} <span class="speaker" data-text="${w[0]}">🔊</span>
        </div>
        <p>
          ${w[2]} <span class="speaker" data-text="${w[2]}">🔊</span>
        </p>
      </div>

      <div class="card">
        <div class="word">
          ${w[1]} <span class="speaker" data-text="${w[1]}">🔊</span>
        </div>
        <p>
          ${w[3]} <span class="speaker" data-text="${w[3]}">🔊</span>
        </p>
      </div>

    </div>
  `;

  popup.classList.add("show");
  attachTTS();
}

/* FIXED TTS BINDING */
function attachTTS(){
  document.querySelectorAll(".speaker").forEach(btn=>{
    btn.onclick = function(){
      let text = this.getAttribute("data-text");
      speak(text);
    }
  });
}

/* TTS */
function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.rate=0.9;
  speechSynthesis.speak(u);
}

/* RESET */
function resetSearch(){
  document.getElementById("searchInput").value="";
  document.getElementById("popup").classList.remove("show");
}

</script>

</body>
</html>
