<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book of Synonyms</title>

<style>
body {
  margin: 0;
  font-family: "Arial", sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #fce3ff, #d6f7ff);
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 6s infinite linear;
}
@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

/* Book container */
.book {
  display: flex;
  width: 400vw;
  height: 100vh;
  transition: transform 0.8s ease-in-out;
}

/* Pages */
.page {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* Cover */
.cover h1 {
  font-size: 48px;
  color: #ff66b2;
  text-shadow: 2px 2px white;
}

.btn {
  padding: 15px 25px;
  margin-top: 20px;
  border: none;
  border-radius: 30px;
  background: #ff8ad4;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px #ff8ad4;
}
.btn:hover {
  transform: scale(1.1);
  background: #ff4fb0;
}

/* Input */
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 20px;
  border: 2px solid #ccc;
  outline: none;
}

/* Search */
.search-box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

/* Popup */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 70%;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from {transform: scale(0.5);}
  to {transform: scale(1);}
}

/* Synonym boxes */
.synonym-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.syn-box {
  background: #e6f7ff;
  padding: 15px;
  border-radius: 15px;
  width: 200px;
  box-shadow: 0 0 10px #ccc;
}

.syn-box button {
  margin-top: 10px;
  border: none;
  background: #66ccff;
  color: white;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
}

/* Warning */
.warning {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="book" id="book">

  <!-- COVER -->
  <div class="page cover">
    <h1>The Book of Synonyms</h1>
    <button class="btn" onclick="goPage(1)">Open Book</button>
  </div>

  <!-- NAME -->
  <div class="page">
    <h2>Enter Your Explorer's Name</h2>
    <input id="nameInput" placeholder="Type your name..." />
    <button class="btn" onclick="saveName()">Save & Continue</button>
    <div class="warning" id="warn"></div>
  </div>

  <!-- GREETING -->
  <div class="page">
    <h2 id="greet">Welcome, Explorer!</h2>
    <button class="btn" onclick="goPage(3)">Let's Explore</button>
  </div>

  <!-- SEARCH -->
  <div class="page">
    <h2>Search an Adjective</h2>
    <div class="search-box">
      <input id="search" placeholder="happy, sad, fast..." />
      <button class="btn" onclick="searchWord()">🔍</button>
    </div>
    <button class="btn" onclick="resetAll()">Reset</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="wordTitle"></h2>
    <div class="synonym-container" id="synContainer"></div>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// pages
let currentPage = 0;
function goPage(p){
  currentPage = p;
  document.getElementById("book").style.transform = `translateX(-${p * 100}vw)`;
}

// name system
function saveName(){
  let name = document.getElementById("nameInput").value.trim();
  if(name === ""){
    document.getElementById("warn").innerText = "Please enter your name!";
    return;
  }
  localStorage.setItem("explorer", name);
  document.getElementById("greet").innerText = `Welcome, Explorer ${name}!`;
  goPage(2);
}

// dataset
const data = {
  happy: [["joyful","She felt joyful when she won."],["cheerful","He is cheerful every day."]],
  sad: [["gloomy","She felt gloomy after the rain."],["downcast","He looked downcast today."]],
  excited: [["thrilled","She was thrilled to see fireworks."],["energetic","He felt energetic in class."]],
  angry: [["furious","He was furious at the mistake."],["irritated","She felt irritated by noise."]],
  brave: [["courageous","The boy was courageous in danger."],["bold","She made a bold choice."]],
  long: [["lengthy","It was a lengthy journey."],["extended","We had an extended break."]],
  fast: [["quick","He is a quick runner."],["rapid","The train is rapid."]],
  slow: [["lazy","The turtle is slow but steady."],["unhurried","She walked in an unhurried way."]],
  pretty: [["beautiful","She is beautiful in the dress."],["lovely","The garden is lovely."]],
  ugly: [["unattractive","The old wall is unattractive."],["plain","The design is plain."]]
};

// search
function searchWord(){
  let word = document.getElementById("search").value.toLowerCase();
  if(!data[word]){
    alert("Word not found!");
    return;
  }

  document.getElementById("wordTitle").innerText = word;

  let container = document.getElementById("synContainer");
  container.innerHTML = "";

  data[word].forEach(item=>{
    let div = document.createElement("div");
    div.className = "syn-box";

    div.innerHTML = `
      <h3>${item[0]}</h3>
      <p>${item[1]}</p>
      <button onclick="speak('${item[0]}')">🔊 Word</button>
      <button onclick="speak('${item[1]}')">🔊 Sentence</button>
    `;

    container.appendChild(div);
  });

  document.getElementById("modal").style.display = "flex";
}

// close
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// reset
function resetAll(){
  document.getElementById("search").value = "";
}

// TTS
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  speechSynthesis.speak(msg);
}

// sparkles
for(let i=0;i<40;i++){
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random()*100 + "vw";
  s.style.animationDuration = (3+Math.random()*5) + "s";
  document.body.appendChild(s);
}

// soft click sound
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = 600;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  });
});
</script>

</body>
</html>
