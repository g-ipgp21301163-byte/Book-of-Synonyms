<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pastel Synonyms Book</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#dff7ff,#f6e6ff,#ffe6f2);
  font-family:'Comic Sans MS',cursive;
  overflow:hidden;
  color:#444;
}

.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  animation:float 8s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-600px);}
}

.book{
  width:920px;
  height:520px;
  background:#fff;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
}

.page{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.active{ display:flex; }

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ffb3d9,#ffd6a5);
  cursor:pointer;
  font-size:16px;
  color:#444;
  box-shadow:0 5px #e6a8c9;
  transition:0.2s;
}
button:hover{ transform:scale(1.1); }
button:active{
  transform:translateY(3px);
  box-shadow:0 2px #e6a8c9;
}

.cover-title{
  font-size:40px;
  color:#ff80bf;
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 5px #fff;}
  to{ text-shadow:0 0 15px #ffb3d9;}
}

input{
  padding:10px;
  border-radius:15px;
  border:2px solid #ddd;
  text-align:center;
}

.popup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
  width:80%;
  text-align:center;
}
.popup.show{
  transform:translate(-50%,-50%) scale(1);
}

.card-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
  margin-top:15px;
}

.card{
  background:#fff0f6;
  padding:15px;
  border-radius:15px;
  width:180px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.word{
  color:#ff66a3;
  font-weight:bold;
}

.controls{
  position:absolute;
  bottom:15px;
  right:15px;
  display:flex;
  gap:10px;
}

.warning{
  color:#ff4d4d;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://drive.google.com/uc?export=download&id=1lXKjOqvOMKnX2wRbpfPUeChigqEdcI1r" type="audio/mpeg">
</audio>

<div class="book">

<!-- COVER -->
<div class="page active" id="page1">
  <h1 class="cover-title">The Book of Synonyms</h1>
  <button onclick="startBook()">Open Book</button>
</div>

<!-- NAME -->
<div class="page" id="page2">
  <h2>Explorer's Name</h2>
  <input id="nameInput" placeholder="Enter your name">
  <button onclick="saveName()">Enter</button>
  <div class="warning" id="warning"></div>
</div>

<!-- GREETING -->
<div class="page" id="page3">
  <h2 id="welcome"></h2>
  <button onclick="nextPage(4)">Let's Explore</button>
</div>

<!-- SEARCH -->
<div class="page" id="page4">
  <h2>Find a word ✨</h2>

  <input id="searchInput" placeholder="Enter adjective">
  <button onclick="searchWord()">🔍</button>

  <div class="popup" id="popup"></div>

  <div class="controls">
    <button onclick="resetSearch()">Reset</button>
    <button onclick="nextPage(1)">Close Book</button>
  </div>
</div>

</div>

<script>

/* bubbles */
for(let i=0;i<25;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.width=b.style.height=(10+Math.random()*20)+"px";
  b.style.left=Math.random()*100+"%";
  b.style.bottom="-50px";
  document.body.appendChild(b);
}

/* navigation */
function nextPage(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");
}

/* start */
function startBook(){
  let music=document.getElementById("bgMusic");
  music.volume=0.3;
  music.play().catch(()=>{});
  nextPage(2);
}

/* name */
function saveName(){
  let name=document.getElementById("nameInput").value.trim();
  let warn=document.getElementById("warning");

  if(name===""){
    warn.innerText="⚠ Please enter your name!";
    return;
  }

  warn.innerText="";
  localStorage.setItem("name",name);
  document.getElementById("welcome").innerText="Welcome, Explorer "+name;
  nextPage(3);
}

/* 10 ADJECTIVES */
const words={
happy:["joyful","cheerful","She felt joyful today.","He is a cheerful boy."],
sad:["unhappy","gloomy","She looked unhappy.","The weather is gloomy."],
excited:["thrilled","eager","She was thrilled to play.","He is eager to learn."],
angry:["mad","furious","He felt mad.","She was furious at him."],
brave:["courageous","bold","The knight is courageous.","She made a bold move."],
long:["lengthy","extended","It was a lengthy story.","The meeting was extended."],
fast:["quick","rapid","He is quick.","The car is rapid."],
slow:["sluggish","unhurried","The turtle is sluggish.","He walked unhurriedly."],
pretty:["beautiful","lovely","She is beautiful.","The flower is lovely."],
ugly:["unattractive","unpleasant","The place is unattractive.","The smell is unpleasant."]
};

/* SMART SEARCH FIX */
function cleanInput(text){
  return text
    .toLowerCase()
    .trim()
    .replace(/[^a-z]/g,"");
}

function searchWord(){
  let input=cleanInput(document.getElementById("searchInput").value);
  let popup=document.getElementById("popup");

  if(!words[input]){
    popup.innerHTML="<p>Word not found 😢</p>";
    popup.classList.add("show");
    return;
  }

  let w=words[input];

  popup.innerHTML=`
    <h3>${input}</h3>

    <div class="card-container">

      <div class="card">
        <div class="word">${w[0]}</div>
        <p>${w[2]}</p>
      </div>

      <div class="card">
        <div class="word">${w[1]}</div>
        <p>${w[3]}</p>
      </div>

    </div>
  `;

  popup.classList.add("show");
}

/* reset */
function resetSearch(){
  document.getElementById("searchInput").value="";
  document.getElementById("popup").classList.remove("show");
}

</script>

</body>
</html>
