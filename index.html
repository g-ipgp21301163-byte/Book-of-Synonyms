<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magic Synonym Book | Year 3 & 4</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #ff6b6b;
            --accent: #feca57;
            --page-bg: #fffdf0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Horizontal Book Container */
        #book-container {
            width: 900px;
            height: 550px;
            background: var(--page-bg);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            border: 10px solid #5d4037;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .active { display: flex; }

        /* Front Cover Styles */
        .cover {
            background: #4a90e2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .bubble {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 4s infinite ease-in-out;
        }

        /* Alive Buttons (3D Effect) */
        .btn-alive {
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--accent);
            color: #333;
            box-shadow: 0 6px #d4a017;
            transition: all 0.1s;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-alive:active {
            box-shadow: 0 2px #d4a017;
            transform: translateY(4px);
        }

        /* Input Styles */
        input {
            padding: 15px;
            border-radius: 10px;
            border: 3px solid var(--primary);
            font-size: 1.2rem;
            width: 300px;
            text-align: center;
        }

        /* Popup Box Styles */
        #synonym-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background: white;
            border: 5px solid var(--accent);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .synonym-box {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }

        .word-card {
            flex: 1;
            background: #eef5ff;
            padding: 15px;
            border-radius: 15px;
            border-left: 10px solid var(--primary);
        }

        .speak-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            margin-left: 10px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="book-container">
        <div id="page1" class="page active cover">
            <div class="bubble" style="width: 40px; height: 40px; top: 10%; left: 20%;"></div>
            <div class="bubble" style="width: 20px; height: 20px; bottom: 15%; right: 15%;"></div>
            <h1 style="font-size: 4rem;">The Magic Synonym Book</h1>
            <p>A Wonderful World of Words!</p>
            <button class="btn-alive" onclick="nextPage(2)">Open Book 📖</button>
        </div>

        <div id="page2" class="page">
            <h2>Welcome to the Library!</h2>
            <p>What is your name, young explorer?</p>
            <input type="text" id="userName" placeholder="Type your name here...">
            <button class="btn-alive" onclick="saveName()">Next Page</button>
        </div>

        <div id="page3" class="page">
            <h1 id="greeting">Welcome, Explorer!</h1>
            <p>Are you ready to find amazing synonyms?</p>
            <button class="btn-alive" onclick="nextPage(4)">Let's Explore 🚀</button>
        </div>

        <div id="page4" class="page">
            <h2>🔎 Synonym Search</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Enter an adjective (e.g., Happy)">
                <button class="btn-alive" style="margin-top: 0;" onclick="searchWord()">Search</button>
            </div>
            <p style="font-size: 0.9rem; color: #666;">Try: Happy, Sad, Brave, Fast, Ugly...</p>
            
            <div style="margin-top: 40px;">
                <button class="btn-alive" style="background: #ccc; box-shadow: 0 6px #999;" onclick="resetBook()">Reset Book</button>
                <button class="btn-alive" style="background: var(--secondary); box-shadow: 0 6px #c0392b;" onclick="closeBook()">Close Book</button>
            </div>
        </div>

        <div id="synonym-popup">
            <h2 id="result-title">Results</h2>
            <div class="synonym-box" id="result-content"></div>
            <button class="btn-alive" onclick="closePopup()">Close Search</button>
        </div>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    let explorerName = "";
    const dictionary = {
        "happy": [
            { word: "Joyful", sentence: "She was joyful when she saw her birthday cake." },
            { word: "Cheerful", sentence: "The birds sang a cheerful song in the morning." }
        ],
        "sad": [
            { word: "Unhappy", sentence: "The boy felt unhappy because it was raining." },
            { word: "Gloomy", sentence: "It was a gloomy day with gray clouds everywhere." }
        ],
        "excited": [
            { word: "Thrilled", sentence: "I was thrilled to go to the zoo!" },
            { word: "Eager", sentence: "The dog was eager to go for a walk." }
        ],
        "angry": [
            { word: "Mad", sentence: "The giant was mad because his treasure was gone." },
            { word: "Furious", sentence: "He was furious when he broke his favorite toy." }
        ],
        "brave": [
            { word: "Fearless", sentence: "The fearless knight fought the dragon." },
            { word: "Courageous", sentence: "It was courageous of her to speak in front of the class." }
        ],
        "long": [
            { word: "Lengthy", sentence: "We went on a lengthy trip across the country." },
            { word: "Extended", sentence: "The giraffe has an extended neck to reach leaves." }
        ],
        "fast": [
            { word: "Quick", sentence: "Be quick or we will miss the bus!" },
            { word: "Speedy", sentence: "The speedy rabbit won the race easily." }
        ],
        "slow": [
            { word: "Sluggish", sentence: "The turtle was sluggish on the hot sand." },
            { word: "Steady", sentence: "He took slow and steady steps up the hill." }
        ],
        "pretty": [
            { word: "Beautiful", sentence: "The garden was full of beautiful flowers." },
            { word: "Lovely", sentence: "She wore a lovely dress to the party." }
        ],
        "ugly": [
            { word: "Unpleasant", sentence: "The troll had an unpleasant face." },
            { word: "Plain", sentence: "The bird looked plain until it spread its wings." }
        ]
    };

    function playClick() {
        document.getElementById('clickSound').play();
    }

    function nextPage(pageNum) {
        playClick();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNum).classList.add('active');
    }

    function saveName() {
        const input = document.getElementById('userName').value;
        if (input.trim() === "") {
            alert("Enter your name first!");
        } else {
            explorerName = input;
            document.getElementById('greeting').innerText = "Welcome, Explorer " + explorerName + "!";
            nextPage(3);
        }
    }

    function searchWord() {
        playClick();
        const input = document.getElementById('searchInput').value.toLowerCase().trim();
        const popup = document.getElementById('synonym-popup');
        const content = document.getElementById('result-content');
        
        if (dictionary[input]) {
            document.getElementById('result-title').innerText = "Synonyms for: " + input.toUpperCase();
            content.innerHTML = "";
            dictionary[input].forEach(item => {
                content.innerHTML += `
                    <div class="word-card">
                        <h3>${item.word} <button class="speak-btn" onclick="speak('${item.word}. ${item.sentence}')">🔊</button></h3>
                        <p><em>Example: ${item.sentence}</em></p>
                    </div>
                `;
            });
            popup.style.display = 'block';
        } else {
            alert("Word not found! Try one of the 10 words like 'Happy' or 'Brave'.");
        }
    }

    function closePopup() {
        playClick();
        document.getElementById('synonym-popup').style.display = 'none';
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function resetBook() {
        playClick();
        document.getElementById('searchInput').value = "";
        nextPage(4);
    }

    function closeBook() {
        playClick();
        location.reload(); // Restarts to cover
    }
</script>
</body>
</html>
